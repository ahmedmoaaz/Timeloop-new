<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeLoop Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }
    
    .header {
      background: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
    }
    
    .header h1 {
      font-size: 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }
    
    .container {
      background: white;
      padding: 16px;
      max-height: 600px;
      overflow-y: auto;
    }
    
    .config-section {
      margin-bottom: 20px;
    }
    
    .config-section label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-bottom: 6px;
    }
    
    .config-section input {
      width: 100%;
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border 0.2s;
    }
    
    .config-section input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .button:hover {
      transform: translateY(-2px);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .button-secondary {
      background: #f0f0f0;
      color: #333;
      margin-top: 8px;
    }
    
    .button-danger {
      background: #ef4444;
      color: white;
      margin-top: 8px;
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      margin-bottom: 16px;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .tab {
      padding: 10px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #666;
      transition: all 0.2s;
    }
    
    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .stats h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    
    .stat-domain {
      font-size: 13px;
      font-weight: 500;
      color: #333;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .stat-time {
      font-size: 13px;
      font-weight: 700;
      color: #667eea;
      margin-left: 12px;
    }
    
    .history-item {
      padding: 12px;
      background: #f9f9f9;
      border-left: 3px solid #667eea;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    
    .history-title {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .history-domain {
      font-size: 11px;
      color: #667eea;
      margin-bottom: 6px;
    }
    
    .history-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #999;
    }
    
    .history-duration {
      font-weight: 700;
      color: #667eea;
    }
    
    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #999;
    }
    
    .empty-state div {
      font-size: 40px;
      margin-bottom: 12px;
    }
    
    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }
    
    .status.success {
      background: #d4edda;
      color: #155724;
    }
    
    .status.error {
      background: #f8d7da;
      color: #721c24;
    }
    
    .status.info {
      background: #d1ecf1;
      color: #0c5460;
    }
    
    .btn-small {
      width: auto;
      padding: 6px 12px;
      font-size: 12px;
    }
    
    .debug-section {
      margin-bottom: 16px;
      padding: 12px;
      background: #f9f9f9;
      border-radius: 6px;
      border-left: 3px solid #667eea;
    }
    
    .debug-title {
      font-size: 12px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    
    .debug-item {
      font-size: 12px;
      color: #333;
      margin-bottom: 4px;
      font-family: monospace;
    }
    
    .debug-value {
      color: #667eea;
      font-weight: 600;
    }
    
    .debug-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
    }
    
    .debug-status.success {
      background: #d4edda;
      color: #155724;
    }
    
    .debug-status.error {
      background: #f8d7da;
      color: #721c24;
    }
    
    .debug-status.warning {
      background: #fff3cd;
      color: #856404;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⏰</div>
    <h1>TimeLoop Tracker</h1>
  </div>
  
  <div class="container">
    <div class="config-section">
      <label for="userId">Your User ID (from TimeLoop Dashboard)</label>
      <input 
        type="text" 
        id="userId" 
        placeholder="Enter your user ID here"
      />
    </div>
    
    <button class="button" id="saveBtn">Save Configuration</button>
    <button class="button button-secondary" id="syncBtn">Sync Now</button>
    
    <div id="status"></div>
    
    <div class="tabs">
      <button class="tab active" data-tab="history">📜 History</button>
      <button class="tab" data-tab="summary">📊 Summary</button>
      <button class="tab" data-tab="debug">🔍 Debug</button>
    </div>
    
    <div class="tab-content active" id="historyTab">
      <div class="stats">
        <h3>
          <span>Recent Activity Queue</span>
          <button class="button button-danger btn-small" id="clearHistoryBtn">Clear</button>
        </h3>
        <div id="historyList"></div>
      </div>
    </div>
    
    <div class="tab-content" id="summaryTab">
      <div class="stats">
        <h3><span>Today's Summary</span></h3>
        <div id="statsList"></div>
      </div>
    </div>
    
    <div class="tab-content" id="debugTab">
      <div class="stats">
        <h3>
          <span>Debug Information</span>
          <button class="button button-secondary btn-small" id="refreshDebugBtn">Refresh</button>
        </h3>
        <div id="debugInfo"></div>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
