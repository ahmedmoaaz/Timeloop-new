<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeLoop Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 350px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }
    
    .header {
      background: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-center;
      color: white;
      font-size: 20px;
    }
    
    .header h1 {
      font-size: 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }
    
    .container {
      background: white;
      padding: 16px;
    }
    
    .config-section {
      margin-bottom: 20px;
    }
    
    .config-section label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-bottom: 6px;
    }
    
    .config-section input {
      width: 100%;
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border 0.2s;
    }
    
    .config-section input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .button:hover {
      transform: translateY(-2px);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .button-secondary {
      background: #f0f0f0;
      color: #333;
      margin-top: 8px;
    }
    
    .stats {
      margin-top: 20px;
    }
    
    .stats h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
    }
    
    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    
    .stat-domain {
      font-size: 13px;
      font-weight: 500;
      color: #333;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .stat-time {
      font-size: 13px;
      font-weight: 700;
      color: #667eea;
      margin-left: 12px;
    }
    
    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #999;
    }
    
    .empty-state div {
      font-size: 40px;
      margin-bottom: 12px;
    }
    
    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }
    
    .status.success {
      background: #d4edda;
      color: #155724;
    }
    
    .status.error {
      background: #f8d7da;
      color: #721c24;
    }
    
    .status.info {
      background: #d1ecf1;
      color: #0c5460;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⏰</div>
    <h1>TimeLoop Tracker</h1>
  </div>
  
  <div class="container">
    <div class="config-section">
      <label for="userId">Your User ID (from TimeLoop Dashboard)</label>
      <input 
        type="text" 
        id="userId" 
        placeholder="Enter your user ID here"
      />
    </div>
    
    <button class="button" id="saveBtn">Save Configuration</button>
    <button class="button button-secondary" id="syncBtn">Sync Now</button>
    
    <div id="status"></div>
    
    <div class="stats">
      <h3>📊 Today's Activity</h3>
      <div id="statsList"></div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
